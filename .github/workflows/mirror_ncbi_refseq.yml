name: Mirror NCBI RefSeq Annotations

on:
  schedule:
    # Run every Friday at 4 AM UTC (third of three sequential runs)
    - cron: '0 4 * * 5'
  workflow_dispatch: # Allow manual triggering

jobs:
  mirror-refseq:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Fetch full history for proper git diff
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tabix curl
    
    - name: Install NCBI datasets CLI
      run: |
        curl -o datasets 'https://ftp.ncbi.nlm.nih.gov/pub/datasets/command-line/LATEST/linux-amd64/datasets'
        chmod +x datasets
        sudo mv datasets /usr/local/bin/
        datasets --version
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create data directory if it doesn't exist
      run: |
        mkdir -p data
    
    - name: Run NCBI RefSeq annotation mirroring
      run: |
        cd providers
        python ncbi.py refseq
      env:
        TAXON_ID: "2759"  # Eukaryotes
        REFSEQ_OUTPUT_FILE: "../data/refseq_annotations.tsv"
        MIRROR_STATS_FILE: "../data/.mirror_stats_refseq.json"
        MIRROR_OUTCOMES_FILE: "../data/.mirror_outcomes_refseq.json"
    - name: Check for changes
      id: check-changes
      run: |
        # Check if the file exists and has content
        if [ -f "data/refseq_annotations.tsv" ]; then
          if [ -n "$(git status --porcelain data/refseq_annotations.tsv)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in refseq_annotations.tsv"
            echo "File size: $(wc -l < data/refseq_annotations.tsv) lines"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "Output file not found"
        fi
    
    - name: Commit and push changes
      if: steps.check-changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        STATS_FILE="data/.mirror_stats_refseq.json"
        ADDED=0
        UPDATED=0
        DELETED=0
        if [ -f "$STATS_FILE" ]; then
          read -r ADDED UPDATED DELETED <<< "$(python3 -c "import json; d=json.load(open('${STATS_FILE}')); print(d['added'], d['updated'], d['deleted'])")"
        fi
        ROWS=$(($(wc -l < data/refseq_annotations.tsv) - 1))
        git add data/refseq_annotations.tsv
        git commit -m "Update NCBI RefSeq annotations [automated]" \
          -m "Added: ${ADDED} | Updated: ${UPDATED} | Deleted: ${DELETED}" \
          -m "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
          -m "Data rows (excl. header): ${ROWS}"
        git push

    - name: Upload mirror outcomes artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mirror-outcomes-refseq
        path: data/.mirror_outcomes_refseq.json
        if-no-files-found: ignore
    